<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS DOM</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="stylesheet" href="../static/style.css">
    <a href="../index.html" class="btn-back">← Kembali</a>
  </head>
  <body>
    <center>
      <div class="container">
        <div class="header">
          <h3>Pendaftaran Peminatan</h3>
        </div>

        <p id="tanggal"></p>
        
        <form action="">
          
          <label for="namaAnda">Nama</label><br />
          <input
            type="text"
            placeholder="Nama anda"
            id="namaAnda"
          /><br /><br />

          <label for="nimAnda">NIM</label><br />
          <input
            type="text"
            placeholder="NIM anda"
            id="nimAnda"
          /><br /><br />

          <label for="Angkatan">Angkatan</label><br />
          <select name="Angkatan" id="Angkatan">
            <option value="">-- Pilih Angkatan --</option>
            <option value="2021">2021</option>
            <option value="2022">2022</option>
            <option value="2023">2023</option>
            <option value="2024">2024</option>
          </select><br /><br />

          <p>Peminatan Pada Bidang</p>
          <input type="radio" name="Bidang" id="Programming" value="Programming" />
          <label for="Programming">Programming</label> <br />

          <input type="radio" name="Bidang" id="Desain" value="Desain" />
          <label for="Desain">Desain</label><br />

          <input type="radio" name="Bidang" id="Jaringan" value="Jaringan" />
          <label for="Jaringan">Jaringan</label><br />

          <input type="radio" name="Bidang" id="Data" value="Data" />
          <label for="Data">Data</label><br /><br />

          <label for="tanggalLahir">Tanggal</label><br />
          <input type="date" id="tanggalLahir" /><br /><br />

          <label for="deskripsi">Alamat</label><br />
          <textarea
            placeholder="Tulis Alamatmu di sini"
            name="Alamat"
            id="deskripsi"
            cols="30"
            rows="5"
          ></textarea><br /><br />

          <button type="button" onclick="kirimData()">Submit</button>

        </form>
      </div>
    </center>

    <script>
      alert("Silakan isi data pendaftaran dengan lengkap");
    </script>

    <script src="script.js"></script>
  </body>
</html>
